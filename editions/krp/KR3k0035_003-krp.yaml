body:
  text: 跋此小字錄活字本蕘圃跋稱曾見邵朗僊藏本標題有古賢二字陳思纂次一行後多崑山後學呉大有較刊一行而以第一葉上半葉末第二行姓劉二字移置宋高祖武帝後删去末行氏字及宋本紀三字注以符原來行數蕘圃因斷此爲初印本有古賢二字者爲後印本惟思所謂後印本者旣稱較刊顯與活字本不符竊甞疑之終以不獲覩邵本爲憾昨偶與友人宗禮白兄談及因岀其曩年所收莫子偲遣書古賢小字錄相示閲之與蕘圃跋所記各點無不吻合其書自第一葉下半葉起行款全同殆所謂後印本歟但細察其字體不類活字且卷首有弘治甲子呉大有序略謂版刻寡傳獲覩者少爰伐梓託壽以表良工之苦心因紀繡梓歳月云云味其語氣確係鋟木面非活字蕘圑或未見此序因而致誤疑慮頓釋亟書於後以與世之同好共質焉乙亥仲冬常熟瞿熙邦
