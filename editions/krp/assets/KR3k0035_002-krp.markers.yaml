  - {type: variant, offset: 0, length: 335, content: 余向蔵古賢小字錄係昭文郡朖僊贈余者云以青蚨三星淂淂書攤者陳思纂次一行後多崑山後學吴大有較刋一行此冊無無始猶疑其板刻有異細審之皆活字板而前所淂者為後印兹所淂者為初印也何以明明蓋此板後帰吴氏故增入一行其收易原書一行以姓劉二字移宋髙祖武帝下而去氏字又去小注宋本紀三字以遷就之其痕迩顯然兹冊古色古香初入眼疑為舊刻故書友欲以充宋元版余六因其古而岀番餅二枚易易重付裝潢可渭好事矣辛未十月二十有五日𣸪翁記慧震即以所得故爲小字卦折故校師利揔適岀揔折揔校鎮惡事騎冲没陣陷折没校豹奴恒逾不悦恒折恒校崖遂不得佳者園云折遂放曰徳之体明僧崖折曰上校斑獸常日早晚增視折日上校此入比折此校慮其不法去折法校巳上係舊箴本紅筆校正之字文理差順附錄滿考彼荅尾皆以古賢小字錄標題此但曰小字錄必修本增加也𣸪翁又記, WYG: ''}
