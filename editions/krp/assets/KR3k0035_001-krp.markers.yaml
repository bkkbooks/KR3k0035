  - {type: variant, offset: 9480, length: 1836, content: 魏史表而上之桂李裔字徽伯小字桂性温直太和中爲頓丘相豪右畏之齊神武大丞相諮議參軍參定䇿功封固安伯爲候軍大將軍陜州剌史周文帝攻剋州城見害皮封隆之字祖裔小名皮寛和有度量累遷河内太守齊神武贈太保謚宣懿搔封繪字仲藻隆之子小名搔釋褐祕書郎累遷平陽太守徴補大行臺吏部郎中文襄徴拜儀同三司右僕射卒謚簡子俱本傳後周沙門王軌小字沙門漢司徒允之後世爲州郡冠族髙祖即位頗有戰功周文帝遇之甚厚以功進位上將軍郯國公永貴宇文貴字永貴貴母初孕夢老人抱一子授之曰賜爾是子俾壽且貴及生形類所夢故以永貴字之歴位大司徒遷太保沙彌王晞字叔朗小名沙彌㓜而孝謹好學不倦魏神武補中外兵曹參軍齊天保初行太原郡事齊亡周武帝以晞為儀同大將軍開皇元年卒俱本傳蘭成庾信字子山父肩吾梁太子中庻子小字蘭成㓜而俊邁聦敏絶倫有天竺僧呼信為蘭成因以為小字西魏留長安周孝閔帝踐祚拜洛州剌史後作哀江南賦有曰王子洛濵之嵗蘭成射策之年名録折陸亀蒙小隋洪兒李敏字樹生小字洪兒父崇為幽州緫管突厥所圍城死髙祖以其父死王事養於宫中及長襲爵肅宗公起家左千牛敏羙姿儀善騎射從征髙麗加光禄大夫或言敏一名洪兒煬帝疑洪字當䜟嘗面告之冀其引决由是大懼敏數與金才等屏人私語宇文述知而奏帝乃伏誅釋奴盧思道字子行祖陽烏字折淵小父道亮隠居不仕思道小字釋奴聽爽俊辯才學兼著左僕射楊彦薦之於朝直中書省周武平齊授儀同三司開皇初徴爲散騎侍郎龍子盧昌衡字子均魏尚書僕射道䖍子小字龍子風神澹雅容止可法博涉經史從弟思道小字釋奴宗中俱稱英妙故幽州為之語曰盧家千里釋奴龍子齊受禪太子舍人遷金部郎中周武平齊授司玉中士隋開皇初拜尚書祠部侍郎仁壽中授儀同三司大業初徴為太子詹事俱本傳唐阿買韓退之集載醉贈張祕書詩人皆勸我酒我若耳不聞今日到君家呼酒持勸君為此座上士及余各為文君詩多態度藹藹春空雲東野動驚俗天葩吐竒芬張籍學古淡軒昻避鷄群阿買不識字頗知書八分詩成使之寫亦足張吾軍云云或問黄魯直阿買是退之何人魯直曰是退之姪必有㨿也阿冝杜牧之集載冬至日寄小姪阿冝詩小姪名阿宜未得三尺長頭圜筋骨緊兩臉明且光去年學官人竹馬遶四廊指揮羣兒軰意氣何堅剛云云添丁盧仝生子名曰添丁欲為國持役也龜兒白樂天集載見小姪龜兒詠燈詩并臘孃製衣因寄行簡己知臘子能裁服復報龜兒解詠燈巧婦才人常薄命莫教男女苦多能俱本傳五代通逹李昭嗣字益光武皇母弟代州刺史克柔之假子小字達通不知族姓所出少事克柔頗謹愿雖形貌眇小而精悍有膽略位侍中中書令莊宗即位贈太師隴西郡王留得李繼韜昭嗣子小字留得陽五周德威字鎭逺小字陽五朔州馬邑人德威身長面黑咲不改容凡對敵列陣凛凛然有肅殺之風同光初追贈太師配饗莊宗廟鐵山薛志勤蔚州奉誠人小字鐡山初為獻祖帳中親信武皇定雲中授右牙都校後以功為大同軍防禦使檢校司空乾寧初為昭義軍節度使雲郎王都本姓劉小字雲郎中山陘邑人太原王王處直養為已子後奪據父位迁太尉侍中周玄豹見之曰王都形似鯉魚難免刀机明宗即位加中書令以其奪據父位深心惡之後以謀叛自焚生鐡張敬逹字志通代州人小字生鐡少以騎射著名明宗即位拜檢校太保應州節度使清泰中自彭門移鎭平陽加檢校少傅末帝詔以敬達爲北面行營都招討使以定州節度楊光逺副焉以軍敗爲安審琦楊光逺斬敬逹首以降晉俱舊五代史唐傳阿檀楊光逺字德明小字阿檀其先沙陀部人也事莊宗爲騎將明宗朝歴媯瀛冀易四州剌史累加校檢少傅將兵戍蔚州晉髙祖舉義兵於太原唐末帝遣光逺與張敬逹屯兵於城下俄而契丹大至為其所敗光逺與次將安審琦殺敬逹歸命髙祖少帝嗣位冊拜太師封壽王謀叛逆拉殺之五代史晉傳鐡胡安重榮小字鐡胡朔州人有力善騎射為振武巡邊指揮使晉髙祖起太原使張頴隂招重榮髙祖即位拜成德軍節度使後以反逆斬首晉髙祖漆其首送于契丹代折五史本傳本朝樵夫趙曮尚書右丞上交子小字樵夫官至著作郎國史折三朝虎兒蘇轍字子由生子逺小字虎兒東坡集載虎兒詩云舊聞老蚌生明珠未省老兎生於莵老兎自謂月中物不騎快馬騎蟾蜍蟾蜍􅐡沙不肎行坐令青衫垂白鬚於莵駿猛不類渠指揮黄熊駕黑貙砂丹紫麝不用塗眼光百步走妖狐妖狐莫誇智有餘不勞搖牙咀爾徒東坡文集米友仁字元暉禮部外郎元章子小字虎兒位至兵部侍郎敷文閣待制㓜年山谷贈詩云我有元暉古印章印刓不忍與諸郎虎兒筆力能扛鼎教字元暉繼阿章谷折山文集梁羅蘇遲小名梁适小名羅並子由子東坡詩載端午㳺真如遲适逺從子由在酒局云一與子由别郤數七端午隨身綵絲繫心與昌獨苦今年疋馬來佳節日夜數兒童喜我至典衣具鷄黍水餅旣懐鄉飯筒仍愍楚謂言必一醉快作西川語寧知是官身糟麴困薰煑獨携三子出古刹訪禪祖髙談付梁羅适小名折梁羅遲詩律到阿虎名折逺小歸來一調咲慰此長齟齬東坡文集小字録終, WYG: ''}
