書御史基子丞相導從父兄也小字阿黑位大將軍王大將軍始欲下都處分樹置先遣參軍告朝廷諷旨時賢祖車騎逖尚未鎮壽春瞋目厲聲語使人曰卿語阿黒何敢不遜催攝靣去須臾不爾我將三千兵槊腳令上王聞之而止世說阿戎王戎字濬冲貞陵侯渾子位司徒以功封安豐縣侯薨謚曰元阮籍素與渾友戎年十五阮曰濬冲清賞非卿倫也與卿言不如與阿戎談世説阿莵王羲之字逸少淮南太守曠子小字阿莵位臨川太守右將軍會稽内史卒贈金紫光禄大夫世說叙録阿齡王胡之字修齡驃騎將軍廙子小字阿齡位司州剌史世說胡之治身清約以風操自居謝太傅安語劉惔阿齡於此事故欲太厲劉曰亦名士之髙操者世說虎㹠王彭之字安壽右僕射彬子小字虎㹠位黄門郎襲爵世說叙録虎犢王彪之字叔虎彭之弟小字虎犢位光禄大夫尚書令儀同三司卒謚曰簡王右軍在南丞相導與書每嘆子姪不令云虎虎犢還其所如彪之年二十而頭鬚皓白時人謂之王白鬚少有局榦之稱世說荆産王徽字㓜仁南鄉侯澄子小字荆産位右軍司馬劉惔云人想王荆産佳此想長松下當有清風耳世説法䕶阿瓜王珣字元琳中領軍洽子小字法護又小字阿瓜位前將軍司徒東亭侯卒謚獻穆謝太傅安領中書監王東亭有事應同上省王後至坐促王謝雖不通太傅猶欽容待之王神意閒暢謝公傾目還謂劉夫人曰向見阿瓜故自未易有雖不相關正自使人不能己巳世說僧彌王珉字季琰珣弟小字僧彌有才藝擅書名出兄右時人語曰僧彌難爲兄法䕶難爲弟代獻之爲中書令時謂小令卒贈太常世說阿奴王濛字仲祖新淦令訥子小字阿奴位司徒左長史劉惔撫王長史背曰阿奴比丞相導但有都長也折都羙劉惔王長史仝坐長史酒酣起舞劉惔曰阿奴今日不復减向子期秀之折類向世說折任率也茍子王脩字敬仁司徒左長史濛子小字茍子眀秀有羙稱善隷行書起家著作郎轉中軍司馬晉本傳劉惔至王長史許清言茍子年十三倚牀邉聽旣去問父曰劉惔語何如尊長史曰韶音令辭不如我徃輙破的勝我世說阿興王藴字叔仁脩弟小字阿興位左將軍左僕射會稽内史卒追贈光禄大夫世稱茍子秀出阿興清和世説阿訥王坦之字文度尚書令述子小字阿訥位中書令北中郎將左衛將軍襲封藍田侯卒謚曰憲世說叙録阿智王處之字文將述子小字阿智州辟别駕不就世説叙録僧恩王褘之字文劭述子小字僧恩位中書侍郎年未三十而卒世説叙録駒王愉字茂和小字駒晉尚書僕射江左冠族子綏亦有重名小名録折陸亀䝉佛大王忱字元逹坦之子小字佛大位建威將軍荆州刺史卒贈右將軍謚曰穆王佛大歎言三日不飲酒覺形神不復相親爲吏部郎嘗作選草臨當奏王僧彌來聊出示之僧彌得便以巳意攺易所選者近半佛大甚以爲佳更寫即奏世説寗王恭字季伯左僕射藴子小字寗位前將軍贈侍中太保謚曰忠簡世説叙録齊王熈字叔和藴子小字齊世説叙録睹王爽字季眀藴子小字睹位黄門侍郎寧朔將軍世説叙録堅石謝尚字仁祖咸亭侯鯤子小字堅石初爲王導椽襲爵咸亭侯鎮西將軍卒謚曰簡世說叙録虎子謝據字玄通吏部尚書裒第二子小字虎子號中郎世説叙録末婢謝琰字瑗度太傅安子小字末婢位輔國將軍以功封望蔡縣公㑹稽内史爲孫恩所害贈侍中司空謚忠肅世説叙録封謝韶字穆度散騎常侍萬子小字封位車騎司馬世說叙録胡兒謝朗字長度安次兄㨿長子小字胡兒名亞於玄仕至東陽太守謝太傅安雪寒日内集與兒女講論文義俄而雪驟公欣然曰白雪紛紛何所似兄子胡兒曰撒鹽空中差可擬兄女曰未若栁絮因風起公大咲樂即公大兄奕女名道藴右將軍王凝之妻也世説遏謝玄字㓜度鎮西將軍奕子小字遏晉都督徐兖青司冀幽并七州軍事封康樂公卒謚獻武謝太傅安因子弟集聚問毛詩何句最佳遏稱曰昔我徃矣楊柳依依今我來思雨雪霏霏公曰訏謨定命逺猶辰告謂此句偏有雅人深致世說末謝淵字叔度奕子小字末晉義興太守說折世叙録益壽謝混字叔源望蔡縣公琰子小字益壽襲爵歴中書令中領軍尚書左僕射以黨劉毅誅國除及宋武受禪謝晦謂劉裕曰陛下應天受命登壇日恨不得謝益夀捧璽黻裕亦嘆曰吾甚恨之使後生不得見其風流晉本傳買得桓冲字㓜子散騎常侍彛子晉䕶南蠻校尉車騎將軍荆州刺史卒謚宣穆冲温弟也初彛亡後冲兄弟並少家貧母患需羊以解無由得之温乃以冲爲質羊主甚富言不欲爲質幸爲養買得郎及冲爲江州岀射羊主於射堂邊看冲識之謂曰我買得也遂厚報之晉本傳石頭桓熈字伯道南郡公温子小字石頭爲冲徒長沙世説叙録式桓歆字叔道温子小字式臨賀公錄折世說叙靈寶桓玄字敬道温孽子小字靈寶襲封南郡公年三十六伏誅其母馬氏常與温同輦夜坐月下見流星墜銅盆中如寸二火珠兢以瓢接取獨馬氏得而吞之有感遂娠及生有光照室占者竒之故小名曰靈寶晉本傳桓宣武薨玄五嵗服始除桓車騎冲與送故文武别因指玄此皆汝家故史佐玄應聲慟哭酸感傍人車騎每自目己坐曰靈寳成人當以此坐還之鞠愛過於所生說折世鎮惡桓石䖍司空豁子小字鎮惡冠軍將軍作塘侯卒追贈右將軍石䖍年十七八未被舉而童隷己呼爲鎮惡郎嘗徃宣武齋頭從征枋頭車騎冲没陣左右莫敢先救宣武謂曰汝叔落賊汝知否石䖍聞之氣甚奮命朱辟爲副䇿馬於數萬衆中莫有抗者徑取冲還三軍嘆伏河朔後以其名斷瘧世説豹奴桓嗣字恭祖車騎將軍冲子小字豹奴領江夏相追贈南中郎將謚曰靖桓豹奴是王丹陽外甥正晉丹陽尹折王丹陽混字奉形似其舅桓甚諱之宣武亡不恒相似時似耳恒似是形時似是神桓逾不恱世說崖桓脩字承祖冲子小字崖龍驤將軍爲劉裕所誅桓玄素輕桓崖崖在京下有好桃玄連就求之遂不得佳者玄與殷仲文書以爲嗤咲曰徳之休眀肅愼貢其楛矢如其不爾籬壁間物亦不可得也世説子野一云野王桓伊字叔夏譙國銍人小字子野一云野王累遷豫州刺史贈右將軍少有才藝善音律為王濛劉惔所知有蔡邕柯亭笛嘗自吹王子猷出都尚在渚下舊聞桓子野善吹笛而不相識遇桓於㟁上過王在船中客有識之者云是桓子野王便令人與相聞云聞君善吹笛試爲我一奏桓時已貴顯素聞王名即便囘下車踞胡牀為三調弄畢便上車去客主不交一言世説阿恭庾㑹字㑹宗太尉亮子小字阿恭年十九爲蘇峻所害庾太尉風儀偉長不輕舉止時人皆以為假亮有大兒數嵗雅重之質便自如此人知是天性温太眞嘗隠幔怛之大兒神色恬然乃徐跪曰君侯何以為此論者謂不减亮或云見阿恭知元䂓非假世説道恩庾羲字義叔亮子小字道恩晉吴國内史世説叙録道季庾龢亮子小字道季晉中領軍世説叙録赤玉庾統字長仁衛將軍懌子小字赤玉少有令名仕至建威將軍潯陽太守簡文帝曰庾赤玉省率治除謝仁祖常云庾赤玉胸中無宿物説折世玉臺庾友字惠彦又字弘之司空氷第三子小字玉臺晉中書郎東陽太守庾玉䑓希之弟也希誅將及玉臺玉䑓子婦宣武弟桓豁女也徒跣求進閽禁不内女厲聲曰是何小人我伯父門下聽我前因突入號泣請曰庾玉䑓常因人脚短三寸當復能作賊不宣武咲曰壻故自急遂原玉䑓一門世説倪庾倩字少彦氷子小字倪晉太宰長史説折世録折叙園客庾爰之字仲眞車騎將軍翼子小字園客有父風仕至輔國將軍庾翼為荆州臨終自表其子園客自代朝廷慮其不從命未知所遣乃共議用桓温劉惔曰使伊去必能尅定西楚恐不可復制後果如惔言世說嘉賓郗超字景興司空愔子小字嘉賔晉中書侍郎司徒左長史超少有才氣越世負俗不循常檢時人為一代盛譽語曰盛徳日新郗嘉賓江東獨步王文叔世說折坦之字文叔倉郗融字景山愔子小字倉世説叙録阿乞郗恢字道胤東安伯曇子小字阿乞襲爵征虜將軍秦州刺史贈鎮軍將軍錄折世說叙羊袁喬字彦叔光禄大夫瓌子小字羊龍驤將軍湘西伯卒追贈益州刺史謚曰簡袁羊嘗詣劉恢恢在内眠未起袁因作詩調之曰角枕粲文茵錦衾爛長筵曰角枕折唐風詩此誰與獨旦袁故嘲之折粲兮錦衾爛珍子美亡劉尚晉眀帝女主見詩不平曰袁羊古之遺狂虎衛玠字叔寶黄門郎恒子小字虎晉太子洗馬世説叙録袁宏字彦伯臨汝令朂子小字虎晉陽東郡守時號袁開美故王子敬詩云袁生開美度桓公入洛過淮泗踐北境與諸僚屬登平乘樓眺曯中原慨然曰遂使神州陸沉百年丘墟王夷甫諸人不得不任其責袁虎率爾對曰運自有廢興豈必諸人之過桓公懔然作色顧謂四座曰諸君頗聞劉景升不有大牛重千斤噉芻豆十倍於常牛負重致逺曾不若一羸牸魏武入荆州烹以饗士卒于時莫不稱快意以况袁四座皆駭袁亦失色世説阿訥許詢字玄度小字阿訥世説錄叙暎先生名邁字叔玄許副第四子小名暎清虚懷道遐棲物外故自改名逺遊與王右軍父子周旋子猷乃修在三之敬眞誥揆長史名謐字思玄一名穆許副第五子少知名儒雅清素博學有才章長史三男長男名甽小名揆真誥虎牙許長史中男名聮字元暉小名虎牙謝安爲䕶軍引爲功曹除永康令衛尉丞晉康太守不之官又爲輔國司馬眞誥玉斧許長史小男名翽字道翔小字玉斧㓜有珪璋標挺長史器異之郡舉上計掾簿並不赴清秀瑩潔糠粃塵務居雷平山下脩業勤精常願早遊洞室不欲久停人世遂詣北洞告終眞誥有云瓊刃者譬許掾小名也眞誥嗣伯許礭字義玄副第七男小名嗣伯梗㮣有大度好學出爲桓温楊州從事謝安衛軍參軍隨謝玄討符堅有功封都鄉侯眞誥道助吴坦之字處靖堅子小字道助濮陽人仕至西中郎功曹世説附子呉隱之字處黙坦之弟小字附子兄弟居在丹陽郡俱有孝行後遭母喪童夫人艱朝夕哭臨及思至賓客弔省號踊哀絶路人為之落淚韓康伯時為丹陽尹母楊州刺史殷浩之妹在郡隣居每聞二呉之哭輙爲悽惻語康伯曰汝若爲選官當好料理此人康伯亦甚相知韓後果爲吏部尚書大呉不免制哀小呉遂大貴逹世説阿源殷浩字淵源光禄勲羨子小字阿源晉中軍將軍楊州刺史桓公語嘉賔阿源有德有言向使作令僕足以儀刑百揆朝廷用違其才耳世説胡奴陶範字道則太尉侃第十九子小字胡奴諸子中最知名歴尚書秘書監袁宏始作東征賦都不道陶公胡奴誘之狹室中臨以白刃曰先公勲業如是君作東征賦何相忽略宏窘蹙無計便答我大道公何以云無因誦曰精金百鍊在割能斷功則治人職思靖亂長沙之勲為史所讚世説盧奴江敳字仲凱僕射虨子小字盧奴敳歴内外簡退著稱位瑯琊内史驃騎咨議參軍王恭欲請江盧奴爲長史晨徃詣江江猶在帳中王坐不敢即言良久乃得及江不應直喚人取酒自飲一盌又不與王王且咲且言那得獨飲江云卿亦復須耶更使酌與王王飲酒畢因得自解去未出戸江曰人自量固爲難世説阿奴周謨字叔治浚子小字阿奴兄顗字伯仁尚書左僕射次兄嵩字仲智周伯仁母冬至舉酒賜三子曰吾本謂度江託足無所爾家有相爾等並羅列吾前復何憂周嵩起長跪泣曰不如阿母言伯仁為人志大而才短名重而識闇好乘人之弊此非自全之道嵩性狼抗亦不容於世唯阿奴碌碌當在阿母目下耳世説僧奴孫騰字北海餘杭令統子小字僧奴仕至廷尉世説叙録盤龍劉毅字希樂彭城人小字盤龍仕晉至都督淮南五郡諸軍事初桓玄在南州起齋悉畫盤龍於其上號爲盤龍齋毅小字盤龍至是遂居之晉本傳驎張湛字處度小字驎張驎酒後好挽歌甚悽苦車騎桓冲曰卿非田横門人何故頓至爾歌世説期生褚爽字弘茂祕書監歆子小字期生晉義興太守贈金紫光禄大夫世説叙録武生毛穆之字憲祖征虜將軍寳子小字武生晉本傳長生李暠字玄盛隴西成紀人小字長生晉􅋽武昭王晉本傳獨活張天錫字純嘏駿少子也小名獨活曾祖軌永嘉中為凉州刺史值亰師大亂遂據􅋽土天錫簒位自立爲凉州牧自軌爲􅋽州至天錫凡九世七十六年符堅使姚萇攻没􅋽州天錫歸長安堅以爲侍中後於壽陽俱敗遂南歸拜散騎常侍西平公説折世蜍曹茂之字永世小字蜍少府卿曼子仕至尚書郎庾道季云㢘頗相如雖千載上死人懍懔常如有生氣曹蜍李志外常侍南康相折志字温祖任至貟雖見在厭厭如九泉下人人皆如此便可結䋲而治但恐狐狸猯狢噉盡曹李質魯折言人皆如天下可結䋲致治世説元龍盧循字子先司空從事中郎湛之曾孫小字元龍晋征虜將軍廣州剌史平越中郎將晉本傳宋阿荅王藴字彦深太中大夫楷子小字阿荅宋湘州刺史給事黄門侍郎言陽侯伏誅説折世録折叙童烏王絢字長素太傅彧子小字童烏宋秘書丞卒謚曰恭世說叙録道兒謝述字景先宣城内史允子小字道兒宋吳興太守左將軍劉湛並與述爲異常之交述美風姿善舉止湛毎謂人曰我見謝道兒未嘗足宋本傳客兒謝靈運太傅玄孫祕書郎瑍子小字客兒襲封康樂公永嘉太守臨川内史元嘉十年伏誅世説叙録阿連謝惠連給事方明子小字阿連宋彭城王義康法曹參軍世説叙録阿多謝曜晉黄門郎思子小字阿多宋御史中丞世説叙録佛佛褚澹之字仲原晉義興太守爽子小字佛佛位尚書吏部廷尉卿左衛將軍謚曰質宋武帝以舊功愛之㑹稽郡有闕朝議欲用蔡廓爲之武帝曰彼自是蔡家佳兒何關人事可用佛佛乃用澹之爲㑹稽太守宋本傳阿壽劉敬宣字萬壽鎭北將軍牢之子小字阿壽爲青州都督諸葛長民貽書敬宣曰盤龍狼戾專恣夷滅異端將盡世路方夷富貴之事相與共之敬宣遣使進呈髙祖謂王誕曰阿壽故為不負我也宋本傳愍孫袁粲字景倩父早卒祖哀其孤幼名之曰愍孫宋尚書令開府儀同三司司徒傳折宋本斑獸劉湛字弘義小字斑獸太祖自豫州長史詔爲太子詹事兼給事時彭城王義康專執朝權而湛昔爲上佐遂以舊情委心自結晚節驅煽義康陵轢朝廷上謂所親曰劉斑初自西還吾與語常日早晚慮其當去比入亦看日早晚慮其不去湛小字斑獸故云斑也遷丹陽尹詹事如故後謀亂伏誅宋本傳道民劉穆之字道和小字道民宋尚書左僕射前將軍追封南康郡王謚文宣宋本傳干木徐羨之字宗立小字干木時傅亮任寄隆重朝廷典儀皆取定於亮蔡廓徴爲吏部尚書因北地傅隆問亮選事亮以語録尚書徐羡之羡之曰黄門郎以下悉以委蔡吾徒不復厝懐自此以上固宜共參同異廓曰我不能爲徐干木署紙尾遂不拜干木羡之小字也宋本傳仙童徐湛之字孝源司空羡之從孫小字仙童㓜狐爲武帝所愛范曄等謀反湛之始與之同後發其事爲曄宗欵辭所連有司以湛之闗豫疑黨請免官削爵付廷尉上不許湛之詣闕上書請罪上優詔不許始曄付廷尉入獄然後知為湛之所發後與謝綜等隔壁遙問綜曰疑誰所告綜曰不知曄乃稱湛之小名曰乃是徐童也宋本傳磚兒范曄字蔚宗車騎將軍泰子小字磚兒母如厠産之額爲磚所傷故以磚爲小字少好學善爲文章位左衞將軍太子詹事與謝綜等謀反伏誅宋本傳梨樝張敷字景㣧小字樝父劭字茂宗小字梨宋文帝戲曰樝何如梨敷對曰梨是百果之宗樝何敢及也宋本傳約傅瑗字叔玉晉御史中丞咸孫小字約仕至安成太守世説叙録女生魯爽小字女生扶風郿人南歸仕至豫州刺史加都督宋本傳天念魯秀爽弟小字天念仕魏太武與爽南歸文帝悦以爽爲司州刺史秀爲榮陽頴川二郡太守孝武即位以爲司州刺史加都督領汝南太守宋魯爽傳長生劉凝之字隱安小名長生宋朝隱逸不仕宋隠逸傳阿舒阿宣雍端通宋徴士陶潛集載責子詩曰白髮被兩鬢肌膚不復實雖有五男兒揔不好紙筆阿舒巳二八懶惰故無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覔棗與栗天運茍如此且進盃中物舒名儼宣名俟雍名份端名佚通名佟皆小名也齊彦孫王粹字景深豫章侯僧綽子小字彦孫齊黄門侍郎世説叙録史公袁彖字偉才宋左僕射顗子小字史公齊侍中卒謚曰靖世説叙録苟兒張敬兒南陽冠軍人父醜為郡將始其母於田中卧夢犬子有角牴之因感而有娠遂生敬兒故初名茍兒宋眀帝嫌茍兒名鄙攺為敬兒位至開府儀同三司齊本傳梁迦葉蕭藻字靜藝小字迦葉善屬文猶好古律髙祖每稱其小字嘆曰子弟如迦葉吾復何憂累遷開府儀同中書令侍中梁本傳養王泰字仲通冠軍將軍慈子小字養梁驍騎將軍謚曰夷世説叙録炬王筠字元禮太中大夫揖子小字炬梁太子詹事世説叙録文殊王訓字懐範國子祭酒􅌔子小字文殊梁侍中卒謚温子世説叙録阿士劉孝綽字孝綽齊大司馬從事中郎繪子小字阿士七嵗能屬文舅齊中書郎王融深賞異之親友號曰神童融每曰天下文章若無我當歸阿士梁本傳阿堆任昉字彦升樂安人齊中散大夫遙子小字阿堆㓜而聦敏早稱神悟八嵗能屬文從叔晷有知人之量見而稱其小名曰阿堆吾家千里駒也仕梁至太常梁本傳東里西華南容北叟任昉有四子東里西華南容北叟並無術業墜其家聲兄弟流離不能自振生平舊交莫有收䘏西華冬月着葛帔練裙道逢平原劉孝標泫然矜之謂曰我當為卿作計乃著廣絶交論以譏其舊友到漑見其論抵几於地終身恨之東里位尚書外兵郎梁任昉傳僧伽劉之遴字思貞虬子小字僧伽八嵗能屬文虬曰此兒必以文興吾宗時有沙門僧惠有異識每詣虬必呼之遴小字曰僧伽福德兒握手而進之仕梁位都官尚書太常卿梁本傳陳僧悦徐陵字孝穆侍中摛子善屬文為兒時小字僧悦陵年數嵗家人携以候沙門釋寶誌誌摩其頂曰天上石麒麟也位至光禄大夫太子少傳特進陳本傳蠻奴任忠字奉誠小字蠻奴詭譎多計略膂力過人尤善騎射累以戰功進領南將軍陳本傳後趙棘奴冉閔字永曾小字棘奴石季龍養孫也父瞻字弘武本姓冉名良魏郡内黄人也閔幼而果鋭季龍撫之如孫及長身長八尺善謀䇿勇力絶人晉載記前秦肩頭符堅字永固一名文王雄之子也小字肩頭祖洪從石季龍徙鄴家于永貴里堅生背有赤文隠起成字曰草付臣又土王咸陽臂垂過膝目有紫光洪竒而愛之名曰肩頭晉載記前燕鳯凰慕容冲小字鳯凰符堅之滅燕慕容冲姊偽清河公主年十四有殊色堅納之寵冠後庭沖年十二亦有龍陽之姿堅又幸之姊弟專寵宫人莫進長安歌之曰一雌復一雄雙飛入紫宫咸懼為亂王猛切諫堅乃出沖長安又謡曰鳯凰鳯凰止阿房堅以鳯凰非梧桐不棲非竹實不食堅乃植桐竹數十萬株於阿房以待之冲小字鳯凰至是終爲堅賊入止阿房城焉符堅傳折晉載紀後燕惡奴慕容農小字惡奴垂第三子晉載記秃頭慕容雲字子雨寳之養子也父名㧞姓髙氏小字秃頭三子而雲季也初童謠曰一束藳兩頭然秃頭小兒來滅燕藳字上有草下有禾兩頭然則禾草俱盡而成髙字垂少子燕竟為雲所滅如童謠焉晉載記後魏烏頭房法壽小字烏頭清河東武城人㓜孤少好射獵仕至魏郡太守以功封壯武侯本傳白頭盧景裕字仲孺太常丞靜子小字白頭少敏專經爲學謙恭守道貞素自得位中書郎除國子博士本傳柰畢衆敬小名柰少好弓馬仕至宋泰山太守後北歸皇興初拜散騎常侍兖州剌史賜爵東平公本傳陁兒畢義雲衆敬子小字陁兒少麤俠文宣受禪累遷御史中丞後爲司徒左長史本傳眞奴李訢字元盛小字眞奴范陽人父崇率十郡歸降太武甚禮之以爲幽州剌史固安侯訢位至司空本傳秦玉楊愔字遵彦小字秦玉神武時位至行䑓右丞本傳黄頭㳺雅字伯度小字黄頭太武時爲祕書監卒贈相州刺史謚曰宣侯本傳繼伯李崇字繼長小字繼伯文成元后第二兄誕之子襲爵陳留公鎮西大將軍本傳記祖酈範字世則范陽人小字記祖少給事東宫累遷尚書右丞平東將軍青州剌史假范陽公卒謚曰穆本傳桃簡崔浩字伯源白馬公宏長子小字桃簡少好文學博覽經史玄象隂陽百家之書無不關綜研精義理位至侍中特進領軍大將軍左光禄大夫世祖朝被誅浩之姻親盡夷其族本傳周兒崔頥小名周兒位至冀州剌史始崔浩與冀州剌史崔頥榮陽太守崔模年皆相次浩爲長次模次頥三人别祖而模頥為親浩恃其家世常侮模頥模謂人曰桃簡正可欺我何合輕我家周兒邪浩小名桃簡頥小名周兒世祖頗聞之故誅浩時二家獲免本傳陽烏盧淵字伯源平東將軍度世子小字陽烏敦尚學業位至祕書監贈安北將軍幽州剌史謚曰懿本傳洪崖盧敏字仲通淵弟小字洪崖少有大量太和初拜議郎早卒贈威逺將軍范陽太守謚曰靖師顔盧昶字叔逹淵弟小字師顔學涉經史早有時譽位至太常卿進號鎭西將軍加散騎常侍卒謚曰穆羨夏盧尚之字季儒昶弟小字羨夏亦以儒素見重位光禄大夫卒贈散騎常侍安東將軍青州剌史皮裴駿字神駒小名皮弘農太守雙碩子幼而聦慧親表稱為神駒因以為字弱冠通涉經史崔浩深噐之目為三可領袖位中書侍郎金盧仲宣儀曹郎中觀弟小名金才學優洽兄弟俱以文章顯位至太尉巨引于謙字思敬小字巨引沉深有識量略窺經史尤好孫子兵書位至雍州牧薨贈加使持節太師雍恒等二十州諸軍事謚曰文夜义元义字伯雋江陽王繼長子小名夜义靈太后臨朝以义妺夫除通直散騎常侍後位至尚書令侍中兾歸長孫稚字承業小名冀歸年六嵗襲爵降爲公髙祖以其㓜承家業賜名稚字承業聦敏有才藝累以戰功遷太傅俱本傳北齊須㧞趙郡王琛字元寳齊神武皇帝之弟子叡小名須㧞㓜孤聦慧夙成特爲神武所愛養於宫中襲爵南趙郡公天保二年出爲定州剌史六州大都督時年十七稱爲良牧佛助魏收字伯起鉅鹿人小字佛助少機警年十五能屬文天保中詔, WYG: ''}
