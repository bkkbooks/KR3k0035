body:
  text: 歴代帝王阿瞞魏太祖武帝姓曹諱操字孟徳漢相國參之後一名吉利小字阿瞞魏本紀寄奴宋髙祖武帝諱裕字徳輿小字寄奴姓劉氏宋本紀車兵宋少帝諱義符小字車兵武帝長子宋本紀車兒宋太祖文帝諱義隆小字車兒武帝第三子宋本紀道民宋世祖孝武帝諱駿字休龍小字道民文帝第三子宋本紀法師宋前廢帝諱子業小字法師孝武帝長子宋本紀榮期宋太宗眀帝諱彧字休炳小字榮期文帝第十一子宋本紀慧震宋後廢帝諱昱字徳融小字慧震明帝長子明帝諸子在孕皆以周易筮之即以所得卦為小字故帝小字慧震宋本紀知觀宋順帝諱準字仲謀小字知觀眀帝第三子宋本紀鬬將齊太祖髙帝諱道成字紹伯小字鬬將姓蕭氏齊本紀龍兒齊世祖武帝諱賾字宣逺小字龍兒髙帝長子生建康縣之清溪宅將産之夕陳孝皇后昭皇后並夢龍據屋故小字為龍兒齊本紀法身齊廢帝鬱林王昭業字元尚小字法身文惠太子長子齊本紀𤣥度齊髙宗明帝諱鸞字景棲始安貞王道生之子小字𤣥度齊本紀練兒梁髙祖武帝諱衍字叔達小字練兒姓蕭氏漢相國何之後梁本紀六通梁太宗簡文帝諱綱字世纘小字六通武帝第三子梁本紀七符梁世祖孝元帝諱繹字世誠小字七符武帝第七子梁本紀法真梁敬帝諱方智字慧相小字法真元帝第九子梁本紀法生陳髙祖武帝諱霸先字興國小字法生姓陳氏漢太丘長寔之後也陳本紀藥王陳廢帝諱伯宗字奉業小字藥王文帝長子在位無人君之器太后稱文帝遺志廢為臨海王陳本紀師利陳髙宗孝宣帝諱頊字紹世小字師利始興昭烈王第二子嘗被酒張燈而寢李總適出尋反見帝是大龍便驚走他室陳本紀黃奴陳後主諱叔寶字元秀小字黄奴宣帝長子陳本紀那羅延隋髙祖文帝姓楊氏諱堅小字那羅延漢太尉震十四世孫大統七年六月生於馮翊般若寺有尼來自河東謂皇妣曰此兒所從來甚異不可於俗間處之皇妣嘗抱髙祖忽頭上出角遍體鱗起皇妣大駭墜於地尼外入見曰巳驚我兒致令晚得天下北史隋本紀阿􅐣隋煬帝諱廣小字阿􅐣髙祖第二子髙祖嘗密令善相者來和視諸子和曰晉王眉上雙骨隆起貴不可言及太子勇廢立為皇太子隋本紀雉奴唐髙宗諱治字為善小字雉奴太宗第九子始封晉王太子承乾敗太宗隂許立魏王泰長孫無忌固欲立晉王帝以太原石文有治萬吉復從無忌帝猶謂無忌曰公勸我立雉奴雉奴仁懦得無為宗社憂奈何唐濮恭王傳桃符晉齊獻王諱攸字大猷小字桃符文帝第二子親賢好施愛經籍能屬文善尺牘特為文帝所寵愛每見攸輒撫牀呼其小字曰此桃符座也晉本傳智隨宋武陵王諱贊字仲敷小字智隨眀帝第九子宋本傳闍梨齊江夏王諱鋒字宣穎小字闍梨髙祖第十二子工書為當時藩王所推南郡王昭業亦稍工書嘗謂武帝曰臣書固應勝江夏王武帝答曰闍梨第一法身第二法身即昭業小名齊本傳白澤齊文惠太子長懋字雲喬小字白澤武帝長子齊本傳維摩梁昭眀太子統字徳施小字維摩武帝長子美姿容善舉止讀書數行並下過目背憶梁本傳四果梁南康簡王績字世謹小字四果武帝第四子梁本傳六真梁邵陵擕王綸字世調小字六真武帝第六子少聰穎博學善屬文尤工尺牘梁本傳明進隋衛昭王爽字師仁小字眀進髙祖異母弟隋本傳睍地代隋房陵王勇小名睍地代文帝長子文帝受禪立為皇太子以罪廢黜追封房陵王北史隋本傳益錢隋庶人諒字徳章小字益錢又㓜字阿客文帝子開皇初封漢王後以罪幽死北史隋本傳阿孩隋齊王暕字世朏小字阿孩煬帝子北史隋本傳季子隋趙王杲小字季子煬帝子北史隋本傳毗沙門唐隠太子建成小字毗沙門髙祖子唐本傳三胡唐巢刺王元吉小字三胡髙祖子與建成謀作亂伏誅唐本傳漢犬子司馬相如字長卿成都人少名犬子好讀書學擊劒慕藺相如之為人乃更名相如前漢本傳鼎匡衡字稚圭一曰衡小名鼎家貧好學諸儒為之語曰無說詩匡鼎來匡説詩解人頤衡少字鼎長乃易字稚圭前漢本傳童烏揚雄子小字童烏九嵗與雄論𤣥陸龜蒙小名録魏萬億李通字文達江夏人小字萬億以俠聞於江汝之間勇冠諸將為太祖所知卒諡剛侯魏志本傳别成傅幹字彥林漢陽太守燮子小字别成位扶風太守世說叙録晉阿童王濬字士治小字阿童為益州刺史時吴中童謠曰阿童復阿童銜刀浮渡江不畏岸上獸但畏水中龍羊祜聞之曰此必水軍有功但當思應其名者耳乃表濬為監益州諸軍事加龍驤將軍竟平吴晉羊祜傳齊奴石崇字季倫大司馬侍中苞子崇生於青州故小字齊奴晉本傳阿龍王導字茂𢎞鎮軍司馬裁子小字阿龍少有風鑑識量清逺位丞相進封始興郡公卒諡文獻晉本傳王丞相拜司空廷尉桓彛作兩髻葛裙策杖路邉窺之嘆曰人言阿龍超阿龍固自超不覺至臺門世説阿太王恱字長豫丞相導子小字阿太位吴王友中書侍郎贈常侍始興貞世子世說録阿螭王恬字敬豫丞相導子小字阿螭位吴國會稽内史散騎常侍卒諡曰憲恬少好武不為公門所重導見恱輒喜見恬便有怒色恬多技藝善奕棋為中興第一晉本傳大奴王劭字敬倫丞相導子小字大奴位建威將軍尚書僕射中領軍卒諡曰簡世說録小奴王薈字敬文丞相導子小字小奴位鎮軍將軍散騎常侍贈衛將軍王僧彌珉謝車騎𤣥共王小奴讌集僧彌舉酒勸謝云奉使君一觴謝曰可爾僧彌勃然作色曰汝故是吴興谿中釣碣耳何敢譸張謝徐撫掌而笑曰衛軍僧彌殊不肅省乃侵陵上國也世說阿黑王敦字處仲治書御史基子丞相導從父兄也小字阿黑位大將軍王大將軍始欲下都處分樹置先遣參軍告朝廷諷㫖時賢祖車騎逖尚未鎮夀春瞋目厲聲語使人曰卿語阿黑何敢不遜催攝面去須臾不爾我將三千兵槊腳令上王聞之而止世說阿戎王戎字濬冲貞陵侯渾子位司徒以功封安豐縣侯薨諡曰元阮籍素與渾友戎年十五阮曰濬冲清賞非卿倫也與卿言不如與阿戎談世説阿菟王羲之字逸少淮南太守曠子小字阿菟位臨川太守右將軍會稽内史卒贈金紫光禄大夫世說叙録阿齡王胡之字修齡驃騎將軍廙子小字阿齡位司州刺史世說胡之治身清約以風操自居謝太傅安語劉惔阿齡於此事故欲太厲劉曰亦名士之髙操者世說虎㹠王彭之字安夀右僕射彬子小字虎㹠位黃門郎襲爵世說叙録虎犢王彪之字叔虎彭之弟小字虎犢位光禄大夫尚書令儀同三司卒諡曰簡王右軍在南丞相導與書每嘆子姪不令云虎􅀈虎犢還其所如彪之年二十而頭鬚皓白時人謂之王白鬚少有局幹之稱世說荆產王徽字㓜仁南鄉侯澄子小字荆產位右軍司馬劉惔云人想王荆產佳此想長松下當有清風耳世説法䕶阿𤓰王珣字元琳中領軍洽子小字法䕶又小字阿𤓰位前將軍司徒東亭侯卒諡獻穆謝太傅安領中書監王東亭有事應同上省王後至坐促王謝雖不通太傅猶斂容待之王神意閒暢謝公傾目還謂劉夫人曰向見阿𤓰故自未易有雖不相關正自使人不能己巳世說僧彌王珉字季琰珣弟小字僧彌有才藝擅書名出兄右時人語曰僧彌難為兄法䕶難為弟代獻之為中書令時謂小令卒贈太常世說阿奴王濛字仲祖新淦令訥子小字阿奴位司徒左長史劉惔撫王長史背曰阿奴比丞相尊但有都長都美也劉惔王長史同坐長史酒酣起舞劉惔曰阿奴今日不復減向子期類向秀之任率也世說茍子王脩字敬仁司徒左長史濛子小字茍子眀秀有美稱善𨽻行書起家著作郎轉中軍司馬晉本傳劉惔至王長史許清言茍子年十三倚牀邊聽既去問父曰劉惔語何如尊長史曰韶音令辭不如我往輒破的勝我世說阿興王藴字叔仁脩弟小字阿興位左將軍左僕射會稽内史卒追贈光禄大夫晉本傳世稱茍子秀出阿興清和世説阿訥王坦之字文度尚書令述子小字阿訥位中書令北中郎將左衛將軍襲封藍田侯卒諡曰憲世說叙録阿智王處之字文將述子小字阿智州辟别駕不就世説叙録僧恩王褘之字文劭述子小字僧恩位中書侍郎年未三十而卒世説叙録駒王愉字茂和小字駒晉尚書僕射江左冠族子綏亦有重名陸龜䝉小名録佛大王忱字元逹坦之子小字佛大位建威將軍荆州刺史卒贈右將軍諡曰穆王佛大歎言三日不飲酒覺形神不復相親為吏部郎嘗作選草臨當奏王僧彌來聊出示之僧彌得便以巳意改易所選者近半佛大甚以為佳更冩即奏世説寗王恭字季伯左僕射藴子小字寗位前將軍贈侍中太保諡曰忠簡世説叙録齊王熈字叔和藴子小字齊世説叙録睹王爽字季眀藴子小字暏位黄門侍郎寧朔將軍世説叙録堅石謝尚字仁祖咸亭侯鯤子小字堅石初為王導椽襲爵咸亭侯鎮西將軍卒諡曰簡世說叙録虎子謝據字𤣥通吏部尚書裒第二子小字虎子號中郎世説序録末婢謝琰字瑗度太傅安子小字末婢位輔國將軍以功封望蔡縣公㑹稽内史為孫恩所害贈侍中司空諡曰忠肅世説叙録封謝韶字穆度散騎常侍萬子小字封位車騎司馬世說叙録胡兒謝朗字長度安次兄據長子小字胡兒名亞於𤣥仕至東陽太守謝太傅安雪寒日内集與兒女講論文義俄而雪驟公欣然曰白雪紛紛何所似兄子胡兒曰撒鹽空中差可擬兄女曰未若栁絮因風起公大笑樂即公大兄奕女名道藴右將軍王凝之妻也世説遏謝𤣥字幻度鎮西將軍奕子小字遏晉都督徐兖青司冀幽并七州軍事封康樂公卒諡曰獻武謝太傅安因子弟集聚問毛詩何句最佳遏稱曰昔我往矣楊柳依依今我來思雨雪霏霏公曰訏謨定命逺猶辰告謂此句偏有雅人深致世說末謝淵字叔度奕子小字末晉義興太守世說叙録益夀謝混字叔源望蔡縣公琰子小字益夀襲爵歴中書令中領軍尚書左僕射以黨劉毅誅國除及宋武受禪謝晦謂劉裕曰陛下應天受命登壇日恨不得謝益夀捧璽黻裕亦歎曰吾甚恨之使後生不得見其風流晉本傳買得桓冲字㓜子散騎常侍彛子小字買得晉䕶南蠻校尉車騎將軍荆州刺史卒諡曰宣穆冲温弟也初彛亡後冲兄弟並少家貧母患需羊以解無由得之温乃以冲為質羊主甚富言不欲為質幸為養買得郎及冲為江州出射羊主於射堂邊看冲識之謂曰我買得也遂厚報之晉本傳石頭桓熈字伯道南郡公温子小字石頭為冲徒長沙世説叙録式桓歆字叔道温子小字式臨賀公世說叙録靈寶桓𤣥字敬道温孽子小字靈寶襲封南郡公年三十六伏誅其母馬氏常與温同輦夜坐月下見流星墜銅盆中如寸二火珠競以瓢接取獨馬氏得而吞之有感遂娠及生有光照室占者竒之故小名曰靈寶晉本傳桓宣武薨𤣥五嵗服始除桓車騎冲與送故文武别因指𤣥此皆汝家故史佐𤣥應聲慟哭酸感傍人車騎每自目己坐曰靈寶成人當以此坐還之鞠愛過於所生世說鎮惡桓石䖍司空豁子小字鎮惡冠軍將軍作塘侯卒追贈右將軍石䖍年十七八未被舉而童𨽻己呼為鎮惡郎嘗往宣武齋頭從征枋頭車騎冲没陣左右莫敢先救宣武謂曰汝叔落賊汝知否石䖍聞之氣甚奮命朱辟為副策馬於數萬衆中莫有抗者徑取冲還三軍嘆服河朔後以其名斷瘧世説豹奴桓嗣字恭祖車騎將軍冲子小字豹奴領江夏相追贈南中郎將諡曰靖桓豹奴是王丹陽外甥王丹陽混字奉正晉丹陽尹形似其舅桓甚諱之宣武曰不恒相似時似耳恒似是形時似是神桓逾不恱世說崖桓脩字承祖冲子小字崖龍驤將軍為劉裕所誅桓𤣥素輕桓崖崖在京下有好桃𤣥連就求之遂不得佳者𤣥與殷仲文書以為嗤笑曰徳之休眀肅愼貢其楛矢如其不爾籬壁間物亦不可得也世説子野一云野王桓伊字叔夏譙國銍人小字子野一云野王累遷豫州刺史贈右將軍少有才藝善音律為王濛劉惔所知有蔡邕柯亭笛嘗自吹王子猷出都尚在渚下舊聞桓子野善吹笛而不相識遇桓於岸上過王在船中客有識之者云是桓子野王便令人與相聞云聞君善吹笛試為我一奏桓時已貴顯素聞王名即便回下車踞胡牀為三調弄畢便上車去客主不交一言世説阿恭庾㑹字㑹宗太尉亮子小字阿恭年十九為蘇峻所害庾太尉風儀偉長不輕舉止時人皆以為假亮有大兒數嵗雅重之質便自如此人知是天性温太眞嘗隠幔怛之大兒神色恬然乃徐跪曰君侯何以為此論者謂不減亮或云見阿恭知元規非假世説道恩庾羲字義叔亮子小字道恩晉吴國内史世説叙録道季庾龢亮子小字道季晉中領軍世説叙録赤玉庾統字長仁衛將軍懌子小字赤玉少有令名仕至建威將軍潯陽太守簡文帝曰庾赤玉省率治除謝仁祖常云庾赤玉胸中無宿物世説玉臺庾友字惠彦又字𢎞之司空氷第三子小字玉臺晉中書郎東陽太守庾玉臺希之弟也希誅將及玉臺玉臺子婦宣武弟桓豁女也徒跣求進閽禁不内女厲聲曰是何小人我伯父門下聽我前因突入號泣請曰庾玉臺常因人脚短三寸當復能作賊不宣武笑曰壻故自急遂原玉臺一門世説倪庾倩字少彦氷子小字倪晉太宰長史世説叙録園客庾爰之字仲眞車騎將軍翼子小字園客有父風仕至輔國將軍庾翼為荆州臨終自表其子園客自代朝廷慮其不從命未知所遣乃共議用桓温劉惔曰使伊去必能尅定西楚恐不可復制後果如惔言世說嘉賓郗超字景興司空愔子小字嘉賓晉中書侍郎司徒左長史超少有才氣越世負俗不循常檢時人為一代盛譽語曰盛徳日新郗嘉賓江東獨步王文度坦之字文度世說倉郗融字景山愔子小字倉世説叙録阿乞郗恢字道𦙍東安伯曇子小字阿乞襲爵征虜將軍秦州刺史贈鎮軍將軍世說叙録羊袁喬字彦叔光禄大夫瓌子小字羊龍驤將軍湘西伯卒追贈益州刺史諡曰簡袁羊嘗詣劉恢恢在内眠未起袁因作詩調之曰角枕粲文茵錦衾爛長筵唐風詩曰角枕粲兮錦衾爛兮子美亡此誰與獨旦袁故嘲之劉尚晉眀帝女主見詩不平曰袁羊古之遺狂虎衛玠字叔寶黄門郎恒子小字虎晉太子洗馬世説叙録袁宏字彦伯臨汝令朂子小字虎晉東陽郡守時號袁開美故王子敬詩云袁生開美度桓公入洛過淮泗踐北境與諸僚屬登平乘樓眺曯中原慨然曰遂使神州陸沉百年丘墟王夷甫諸人不得不任其責袁虎率爾對曰運自有廢興豈必諸人之過桓公懔然作色顧謂四座曰諸君頗聞劉景升不有大牛重千觔噉芻豆十倍於常牛負重致逺曾不若一羸牸魏武入荆州烹以饗士卒于時莫不稱快意以況袁四座皆駭袁亦失色世説阿訥許詢字𤣥度小字阿訥世説叙録暎先生名邁字叔𤣥許副第四子小名暎清虚懷道遐棲物外故自改名逺逰與王右軍父子周旋子猷乃修在三之敬眞誥揆長史名謐字思𤣥一名穆許副第五子少知名儒雅清素博學有才章長史三男長男名甽小名揆真誥虎牙許長史中男名聮字元暉小名虎牙謝安為䕶軍引為功曹除永康令衛尉丞晉康太守不之官又為輔國司馬眞誥玉斧許長史小男名翽字道翔小字玉斧幼有珪璋標挺長史器異之郡舉上計掾簿並不赴清秀瑩潔糠粃塵務居雷平山下脩業勤精常願早逰洞室不欲久停人世遂詣北洞告終眞誥有云瓊刃者譬許掾小名也眞誥嗣伯許確字義𤣥副第七男小名嗣伯梗概有大度好學出為桓温揚州從事謝安衛軍參軍隨謝𤣥討苻堅有功封都鄉侯眞誥道助吴坦之字處靖堅子小字道助濮陽人仕至西中郎功曹世説附子呉隠之字處黙坦之弟小字附子兄弟居在丹陽郡俱有孝行後遭母喪童夫人艱朝夕哭臨及思至賓客弔省號踊哀絶路人為之落淚韓康伯時為丹陽尹母揚州刺史殷浩之妹在郡隣居每聞二呉之哭輒為悽惻語康伯曰汝若為選官當好料理此人康伯亦甚相知韓後果為吏部尚書大呉不免制哀小呉遂大貴達世説阿源殷浩字淵源光禄勲羨子小字阿源晉中軍將軍揚州刺史桓公語嘉賓阿源有徳有言向使作令僕足以儀刑百揆朝廷用違其才耳世説胡奴陶範字道則太尉侃第十九子小字胡奴諸子中最知名歴尚書秘書監袁宏始作東征賦都不道陶公胡奴誘之狹室中臨以白刃曰先公勲業如是君作東征賦何相忽畧宏窘蹙無計便答我曾大道何以云無因誦曰精金百鍊在割能斷功則治人職思靖亂長沙之勲為史所讚世説盧奴江敳字仲愷僕射彪子小字盧奴敳歴内外簡退著稱位瑯琊内史驃騎咨議叅軍王恭欲請江盧奴為長史晨往詣江江猶在帳中王坐不敢即言良久乃得及江直喚人取酒自飲一盌又不與王王且笑且言那得獨飲江云卿亦復須耶更使酌與王王飲酒畢因得自解去未出户江曰人自量固為難世説阿奴周謨字叔治浚子小字阿奴兄顗字伯仁尚書左僕射次兄嵩字仲智周伯仁母冬至舉酒賜三子曰吾本謂度江託足無所爾家有相爾等並羅列吾前復何憂周嵩起長跪泣曰不如阿母言伯仁為人志大而才短名重而識闇好乘人之弊此非自全之道嵩性狼抗亦不容於世惟阿奴碌碌當在阿母目下耳世説僧奴孫騰字北海餘杭令統子小字僧奴仕至廷尉世説叙録盤龍劉毅字希樂彭城人小字盤龍仕晉至都督淮南五郡諸軍事初桓𤣥在南州起齋悉畫盤龍於其上號為盤龍齋毅小字盤龍至是遂居之晉本傳驎張湛字處度小字驎張驎酒後好挽歌甚悽苦車騎桓沖曰卿非田横門人何故頓至爾歌世説期生褚爽字𢎞茂祕書監歆子小字期生晉義興太守贈金紫光禄大夫世説叙録武生毛穆之字憲祖征虜將軍寶子小字武生晉本傳長生李暠字𤣥盛隴西成紀人小字長生晉涼武昭王獨活張天錫字純嘏駿少子也小名獨活曾祖軌永嘉中為涼州刺史值京師大亂遂據涼土天錫簒位自立為涼州牧自軌為涼州至天錫凡九世七十六年苻堅使姚萇攻没涼州天錫歸長安堅以為侍中後於壽陽俱敗遂南歸拜散騎常侍西平公世説蜍曹茂之字永世小字蜍少府卿曼子仕至尚書郎庾道季云亷頗相如雖千載上死人懍懔常如有生氣曹蜍李志志字温祖仕至員外常侍南康相雖見在厭厭如九泉下人人皆如此便可結繩而治但恐狐狸猯狢噉盡言人皆如曹李質魯天下可結繩致治世説元龍盧循字子先司空從事中郎湛之曾孫小字元龍晋征虜將軍廣州刺史平越中郎將晋本傳宋阿答王藴字彥深太中大夫楷子小字阿答宋湘州刺史給事黄門侍郎成陽侯伏誅世説叙録童烏王絢字長素太傅彧子小字童烏宋秘書丞卒諡曰恭道兒謝述字景先宣城内史允子小字道兒宋吳興太守左將軍劉湛並與述為異常之交述美風姿善舉止湛毎謂人曰我見謝道兒未嘗足宋本傳客兒謝靈運太傅𤣥孫祕書郎瑍子小字客兒襲封康樂公永嘉太守臨川内史元嘉十年伏誅世説叙録阿連謝惠連給事方眀子小字阿連宋彭城王義康法曹叅軍世説叙録阿多謝曜晉黄門郎思子小字阿多宋御史中丞世説叙録佛佛褚澹之字仲原晉義興太守爽子小字佛佛位尚書吏部廷尉卿左衛將軍諡曰質宋武帝以舊功愛之㑹稽郡有闕朝議欲用蔡廓為之武帝曰彼自是蔡家佳兒何闗人事可用佛佛乃用澹之為㑹稽太守宋本傳阿壽劉敬宣字萬壽鎮北將軍牢之子小字阿壽為青州都督諸葛長民貽書敬宣曰盤龍狼戾專恣自取夷滅異端將盡世路方夷富貴之事相與共之敬宣遣使進呈髙祖謂王誕曰阿壽故為不負我也宋本傳愍孫袁粲字景倩父早卒祖哀其孤幼名之曰愍孫宋尚書令開府儀同三司司徒宋本傳班虎劉湛字𢎞仁小字班虎太祖自豫州長史詔為太子詹事兼給事時彭城王義康專執朝權而湛昔為上佐遂以舊情委心自結晚節驅煽義康陵轢朝廷上謂所親曰劉班初自西還吾與語嘗看日早晚慮其當去比入朝亦看日早晚慮其不去湛小字班虎故云班也遷丹陽尹詹事如故後謀亂伏誅宋本傳道民劉穆之字道和小字道民宋尚書左僕射前將軍追封南康郡王諡曰文宣宋本傳干木徐羨之字宗立小字干木時傅亮任寄隆重朝廷典儀皆取定於亮蔡廓徴為吏部尚書因北地傅隆問亮選事亮以語録尚書徐羨之羨之曰黄門郎以下悉以委蔡吾徒不復厝懐自此以上固宜共叅同異廓曰我不能為徐干木署紙尾遂不拜干木羨之小字也宋本傳仙童徐湛之字孝源司空羨之從孫小字仙童幼狐為武帝所愛范蔚宗謀反湛之始與之同後發其事為蔚宗欵辭所連有司以湛之闗豫疑黨請免官削爵付廷尉上不許湛之詣闕上書請罪上優詔不許蔚宗付廷尉入獄然後知為湛之所發後與謝綜等隔壁遙問綜曰疑誰所告綜曰不知蔚宗稱湛之小名曰乃是徐仙童也宋本傳磚兒范蔚宗車騎將軍泰之子小字磚兒其母如厠産之額為磚所傷故以磚為小字少好學善為文章位左衞將軍太子詹事與謝綜等謀反伏誅宋本傳梨樝張敷字景𦙍小字樝父劭字茂宗小字梨宋文帝戯曰樝何如梨敷對曰梨是百菓之宗樝何敢及也宋本傳約傅瑗字叔玉晉御史中丞咸孫小字約仕至安成太守世説叙録女生魯爽小字女生扶風郿人南歸仕至豫州刺史加都督宋本傳天念魯秀爽弟小字天念仕魏太武與爽南歸文帝悦以爽為司州刺史秀為榮陽潁川二郡太守孝武即位以為司州刺史加都督領汝南太守宋魯爽傳長生劉凝之字隠安小名長生宋朝隠逸不仕宋隠逸傳阿舒阿宣雍端通宋徴士陶潛集載責子詩曰白髮被兩鬢肌膚不復實雖有五男兒揔不好紙筆阿舒巳二八懶惰故無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覔棗與栗天運茍如此且進盃中物舒名儼宣名俟雍名份端名佚通名佟皆小名也齊彥孫王粹字景深豫章侯僧綽子小字彥孫齊黄門侍郎世説叙録史公袁彖字偉才宋左僕射顗子小字史公齊侍中卒諡曰靖世説叙録狗兒張敬兒南陽冠軍人父醜為郡將始其母於田中卧夢犬子有角牴之因感而有娠遂生敬兒故初名狗兒宋眀帝嫌狗兒名鄙改為敬兒位至開府儀同三司齊本傳梁迦葉蕭藻字靜藝小字迦葉善屬文尤好古律髙祖每稱其小字嘆曰子弟如迦葉吾復何憂累遷開府儀同中書令侍中梁本傳養王泰字仲通冠軍將軍慈子小字養梁驍騎將軍諡曰夷世説叙録炬王筠字元禮太中大夫揖子小字炬梁太子詹事世説叙録文殊王訓字懐範國子祭酒暕子小字文殊梁侍中卒諡曰温子世説叙録阿士劉孝綽字孝綽齊大司馬從事中郎繪子小字阿士七嵗能屬文舅齊中書郎王融深賞異之親友號曰神童融每曰天下文章若無我當歸阿士梁本傳阿堆任昉字彥升樂安人齊中散大夫遙子小字阿堆幼而聰敏早稱神悟八嵗能屬文從叔晷有知人之量見而稱其小名曰阿堆吾家千里駒也仕梁至太常梁本傳東里西華南容北叟任昉有四子東里西華南容北叟並無術業墜其家聲兄弟流離不能自振生平舊交莫有收䘏西華冬月着葛帔練裙道逢平原劉孝標泫然矜之謂曰我當為卿作計乃著廣絶交論以譏其舊友到溉見其論抵几於地終身恨之東里位尚書外兵郎梁任昉傳僧伽劉之遴字思貞虬子小字僧伽八嵗能屬文虬曰此兒必以文興吾宗時有沙門僧恵有異識每詣虬必呼之遴小字曰僧伽福徳兒握手而進之仕梁位都官尚書太常卿梁本傳陳僧悦徐陵字孝穆侍中摛子善屬文為兒時小字僧悦陵年數嵗家人携以候沙門釋寶誌誌摩其頂曰天上石麒麟也位至光禄大夫太子少傅特進陳本傳蠻奴任忠字奉誠小字蠻奴詭譎多計略膂力過人尤善騎射累以戰功進鎮南將軍陳本傳後趙棘奴冉閔字永曾小字棘奴石季龍養孫也父瞻字𢎞武本姓冉名良魏郡内黄人也閔幼而果鋭季龍撫之如孫及長身長八尺善謀䇿勇力絶人晉載記前秦肩頭苻堅字永固一名文王雄之子也小字肩頭祖洪從石季龍徙鄴家于永貴里堅生背有赤文隠起成字曰草付臣又土王咸陽臂垂過膝目有紫光洪竒而愛之名曰肩頭晉載記前燕鳯凰慕容沖小字鳯凰苻堅之滅燕慕容沖姊偽清河公主年十四有殊色堅納之寵冠後庭沖年十二亦有龍陽之姿堅又幸之姊弟專寵宫人莫進長安歌之曰一雌復一雄雙飛入紫宫咸懼為亂王猛諫堅乃出沖長安乂謠曰鳯凰鳯凰止阿房堅以鳯凰非梧桐不棲非竹實不食堅乃植桐竹數十萬株於阿房以待之沖小字鳯凰至是終為堅賊入止阿房城焉晉載紀苻堅傳後燕惡奴慕容農小字惡奴垂第三子晉載記禿頭慕容雲字子雨寶之養子也父名拔姓髙氏小字禿頭三子而雲季也初童謠曰一束藳兩頭然禿頭小兒來滅燕藳字上有草下有禾兩頭然則禾草俱盡而成髙字垂少子燕竟為雲所滅如童謠焉晉載記後魏烏頭房法壽小字烏頭清河東武城人幼孤少好射獵仕至魏郡太守以功封壯武侯本傳白頭盧景裕字仲孺太常丞靜子小字白頭少敏專經為學謙恭守道貞素自得位中書郎除國子博士本傳柰畢衆敬小名柰少好弓馬仕宋至泰山太守後北歸皇興初拜散騎常侍兖州刺史賜爵東平公本傳陁兒畢義雲衆敬子小字陁兒少麤俠文宣受禪累遷御史中丞後為司徒左長史本傳眞奴李訢字元盛小字眞奴范陽人父崇率十郡歸降太武甚禮之以為幽州刺史固安侯訢位至司空本傳秦玉楊愔字遵彥小字秦玉神武時位至行臺右丞本傳黄頭㳺雅字伯度小字黄頭太武時為祕書監卒贈相州刺史諡曰宣侯本傳繼伯李崇字繼長小字繼伯文成元后第二兄誕之子襲爵陳留公鎭西大將軍本傳記祖酈範字世則范陽人小字記祖少給事東宫累遷尚書右丞平東將軍青州刺史假范陽公卒謚曰穆本傳桃簡崔浩字伯源白馬公宏子小字桃簡少好文學博覽經史𤣥象隂陽百家之書無不闗綜研精義理位至侍中特進領軍大將軍左光禄大夫世祖朝被誅浩之姻親盡夷其族本傳周兒崔頥小名周兒位至冀州刺史始崔浩與冀州刺史崔頥榮陽太守崔模年皆相次浩為長次模次頥三人别祖而模頥為親浩恃其家世常侮模頥模謂人曰桃簡正可欺我何合輕我家周兒邪浩小名桃簡頥小名周兒世祖頗聞之故誅浩時二家獲免本傳陽烏盧淵字伯源平東將軍度世子小字陽烏敦尚學業位至祕書監贈安北將軍幽州刺史諡曰懿本傳洪崖盧敏字仲通淵弟小字洪崖少有大量太和初拜議郎早卒贈威逺將軍范陽太守諡曰靖師顏盧昶字叔逹淵弟小字師顏學涉經史早有時譽位至太常卿進號鎭西將軍加散騎常侍卒諡曰穆羨夏盧尚之字季儒昶弟小字羨夏亦以儒素見重位光禄大夫卒贈散騎常侍安東將軍青州刺史皮裴駿字神駒小名皮𢎞農太守雙碩子幼而聰慧親表稱為神駒因以為字弱冠通涉經史崔浩深器之目為三可領袖位中書侍郎金盧仲宣儀曹郎中觀弟小名金才學優洽兄弟俱以文章顯位至太尉巨引于謙字思敬小字巨引沈深有識量略窺經史尤好孫子兵書位至雍州牧薨贈加使持節太師雍恒等二十州諸軍事諡曰文夜叉元乂字伯雋江陽王繼長子小名夜叉靈太后臨朝以乂妺夫除通直散騎常侍後位至尚書令侍中兾歸長孫稚字承業小名兾歸年六嵗襲爵降為公髙祖以其幼承家業賜名稚字承業聰敏有才藝累以戰功遷太傅俱本傳北齊須拔趙郡王琛字元寳齊神武皇帝之弟子叡小名須拔幼孤聰慧夙成特為神武所愛養於宫中襲爵南趙郡公天保二年出為定州刺史六州大都督時年十七稱為良牧佛助魏收字伯起鉅鹿人小字佛助少機警年十五能屬文天保中詔撰魏史表而上之桂李裔字徽伯小字桂性温直太和中為頓丘相豪右畏之齊神武大丞相諮議叅軍參定策功封固安伯為候軍大將軍陜州刺史周文帝攻尅州城見害皮封隆之字祖裔小名皮寛和有度量累遷河内太守齊神武贈太保諡曰宣懿搔封繪字仲藻隆之子小名搔釋褐祕書郎累遷平陽太守徴補大行臺吏部郎中文襄徴拜儀同三司右僕射卒諡曰簡子俱本傳後周沙門王軌小字沙門漢司徒允之後世為州郡冠族髙祖即位頗有戰功周文帝遇之甚厚以功進位上將軍郯國公永貴宇文貴字永貴貴母初孕夢老人抱一子授之曰賜爾是子俾壽且貴及生形類所夢故以永貴字之歴位大司徒遷太保沙彌王晞字叔朗小名沙彌幼而孝謹好學不倦魏神武中補外兵曹參軍齊天保初行太原郡事齊亡周武帝以晞為儀同大將軍開皇元年卒俱本傳蘭成庾信字子山父肩吾梁太子中庶子小字蘭成幼而俊邁聰敏絶倫有天竺僧呼信為蘭成因以為小字使西魏留長安周孝閔帝踐祚拜洛州刺史後作哀江南賦有曰王子洛濵之嵗蘭成射策之年小名録隋洪兒李敏字樹生小字洪兒父崇為幽州總管突厥圍城死之高祖以其父死王事養於宫中及長襲爵廣宗縣公起家左千牛敏美姿儀善騎射從征髙麗加光禄大夫或言敏一名洪兒煬帝疑洪字當䜟嘗面告之冀其引決由是大懼敏數與金才等屏人私語宇文述知而奏帝乃伏誅釋奴盧思道字子行祖陽烏淵小字父道亮隠居不仕思道小字釋奴聰爽俊辯才學兼著左僕射楊彥薦之於朝直中書省周武平齊授儀同三司開皇初徴為散騎侍郎龍子盧昌衡字子均魏尚書僕射道䖍子小字龍子風神澹雅容止可法博涉經史從弟思道小字釋奴宗中俱稱英妙故幽州為之語曰盧家千里釋奴龍子齊受禪太子舍人遷金部郎中周武平齊授司玉中士隋開皇初拜尚書祠部侍郎仁壽中授儀同三司大業初徴為太子詹事俱本傳唐阿買韓退之集載醉贈張祕書詩人皆勸我酒我若耳不聞今日到君家呼酒持勸君為此座上士及余各為文君詩多態度藹藹春空雲東野動驚俗天葩吐竒芬張籍學古淡軒昻避雞羣阿買不識字頗知書八分詩成使之冩亦足張吾軍云云或問黄魯直阿買是退之何人魯直曰是退之姪必有據也阿宜杜牧之集載冬至日寄小姪阿宜詩小姪名阿宜未得三尺長頭圜筋骨緊兩臉眀且光去年學官人竹馬遶四廊指揮羣兒輩意氣何堅剛云云添丁盧仝生子名曰添丁欲為國持役也龜兒白樂天集載見小姪龜兒詠燈詩并臘孃製衣因寄行簡己知臘子能裁服復報龜兒解詠燈巧婦才人常薄命莫教男女苦多能俱本傳五代通逹李昭嗣字宇益光武皇母弟代州刺史克柔之假子小字通達不知族姓所出少事克柔頗謹愿雖形貌眇小而精悍有膽略位侍中中書令莊宗即位贈太師隴西郡王留得李繼韜昭嗣子小字留得陽五周徳威字鎭逺小字陽五朔州馬邑人徳威身長面黑笑不改容凡對敵列陣凛凛然有肅殺之風同光初追贈太師配饗莊宗廟鐵山薛志勤蔚州奉誠人小字鐵山初為獻祖帳中親信武皇定雲中授右牙都校後以功為大同軍防禦使檢校司空乾寧初為昭義軍節度使雲郎王都本姓劉小字雲郎中山陘邑人太原王王處直養為已子後奪據父位遷太尉侍中周𤣥豹見之曰王都形似鯉魚難免刀機明宗即位加中書令以其奪據父位心深惡之後以謀叛自焚生鐵張敬逹字志通代州人小字生鐵少以騎射著名眀宗即位拜檢校太保應州節度使清泰中自彭門移鎭平陽加檢校少傅末帝詔以敬達為北面行營都招討使以定州節度楊光逺副焉以軍敗為安審琦楊光逺斬敬逹首以降晉俱舊五代史唐傳阿檀楊光逺字徳眀小字阿檀其先沙陀部人也事莊宗為騎將明宗朝歴媯瀛冀易四州刺史累加檢校少傅將兵戍蔚州晉髙祖舉義兵於太原唐末帝遣光逺與張敬逹屯兵於城下俄而契丹大至為其所敗光逺與次將安審琦殺敬逹歸命髙祖少帝嗣位册拜太師封壽王後謀叛逆拉殺之五代史晉傳鐵胡安重榮小字鐵胡朔州人有力善騎射為振武巡邊指揮使晉髙祖起太原使張穎陰招重榮髙祖即位拜成徳軍節度使後以反逆斬首晉髙祖漆其首送于契丹五代史本傳本朝樵夫趙曮尚書右丞上交子小字樵夫官至著作郎三朝國史虎兒蘇轍字子由生子逺小字虎兒東坡集載虎兒詩云舊聞老蚌生明珠未省老兎生於莵老兎自謂月中物不騎快馬騎蟾蜍蟾蜍􅐡沙不肯行坐令青衫垂白鬚於莵駿猛不類渠指揮黄熊駕黑貙丹砂紫麝不用塗眼光百步走妖狐妖狐莫誇智有餘不勞搖牙咀爾徒東坡文集米友仁字元暉禮部員外郎元章子小字虎兒位至兵部侍郎敷文閣待制幼年山谷贈詩云我有元暉古印章印刓不忍與諸郎虎兒筆力能扛鼎教字元暉繼阿章山谷文集梁羅蘇遲小名梁适小名羅並子由子東坡詩載端午㳺真如遲适逺從子由在酒局云一與子由别郤數七端午隨身綵絲繫心與昌􅍦苦今年疋馬來佳節日夜數兒童喜我至典衣具雞黍水餅既懐鄉飯筒仍愍楚謂言必一醉快作西川語寧知是官身糟麴困薰煮獨擕三子出古刹訪禪祖髙談付梁羅梁羅遲适小名詩律到阿虎逺小名歸來一調笑慰此長齟齬東坡文集小字録
