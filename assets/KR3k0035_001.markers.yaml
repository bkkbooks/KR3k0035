  - {type: variant, offset: 9422, length: 1821, content: 魏史表而上之桂李裔字徽伯小字桂性溫直太和中為頓丘相豪右畏之齊神武大丞相諮議參軍參定策功封固安伯為候軍大將軍陝州剌史周文帝攻剋州城見害皮封隆之字祖裔小名皮寬和有度量累遷河內太守齊神武贈太保謚宣懿搔封繪字仲藻隆之子小名搔釋褐祕書郎累遷平陽太守徵補大行臺吏部郎中文襄徵拜儀同三司右僕射卒謚簡子俱本傳沙門王軌小字沙門漢司徒允之後世為州郡冠族高祖即位頗有戰功周文帝遇之甚厚以功進位上將軍郯國公永貴宇文貴字永貴貴母初孕夢老人抱一子授之曰賜爾是子俾壽且貴及生形類所夢故以永貴字之歷位大司徒遷太保沙彌王晞字叔朗小名沙彌幼而孝謹好學不倦魏神武補中外兵曹參軍齊天保初行太原郡事齊亡周武帝以晞為儀同大將軍開皇元年卒俱本傳蘭成庾信字子山父肩吾梁太子中庶子小字蘭成幼而俊邁聰敏絕倫有天竺僧呼信為蘭成因以為小字西魏臺長安周孝閔帝踐祚拜洛州剌史後作哀江南賦有曰王子洛濱之歲蘭成射策之年陸龜蒙小名錄洪兒李敏字樹生小字洪兒父崇為幽州總管突厥所圍死之高祖以其父死王事養於宮中及長襲爵肅宗公起家左千牛敏美姿儀善騎射從征高麗加光祿大夫或言敏一名洪兒煬帝疑洪字當讖嘗面告之冀其引決由是大懼敏數與金才等屏人私語宇文述知而奏帝乃伏誅釋奴盧思道字子行祖陽烏淵小字父道亮隱居不仕思道小字釋奴聽爽俊辯才學兼著左僕射楊彥薦之於朝直中書省周武平齊授儀同三司開皇初徵為散騎侍郎龍子盧昌衡字子均魏尚書僕射道虔子小字龍子風神澹雅容止可法博涉經史從弟思道小字釋奴宗中俱稱英妙故幽州為之語曰盧家千里釋奴龍子齊受禪太子舍人遷金部郎中周武平齊授司玉中士隋開皇初拜尚書祠部侍郎仁壽中授儀同三司大業初徵為太子詹事俱本傳阿買韓退之集載醉贈張祕書詩人皆勸我酒我若耳不聞今日到君家呼酒持勸君為此座上士及余各為文君詩多態度藹藹春空雲東野動驚俗天葩吐奇芬張籍學古談軒昂避雞群阿買不識字頗知書八分詩成使之寫亦足張吾軍云云或問黃魯直阿買是退之何人魯直曰是退之姪必有據也阿宜杜牧之集載冬至日寄小姪阿宜詩小姪名阿宜未得三尺長頭圜筋骨緊兩臉明且光去年學官人竹馬遶四廊指揮群兒輩意氣何堅剛云云添丁盧仝生子名曰添丁欲為國持役也龜兒白樂天集載見小姪龜兒詠燈詩并臘孃製衣因寄行簡已知臘子能裁服復報龜兒解詠燈巧婦才人常薄命莫教男女苦多能俱本傳通達李昭嗣字益光武皇母弟代州剌史克柔之假子小字達通不知族姓所出少事克柔頗謹願雖形貌眇小而精悍有膽略位侍中中書令莊宗即位贈太師隴西郡王留得李繼韜昭嗣子小字留得陽五周德威字鎮遠小字陽五朔州馬邑人德威身長面黑咲不改容凡對敵列陣凜凜然有肅殺之風同光初追贈太師配饗莊宗廟鐵山薛志勤蔚州奉誠人小字鐵山初為獻祖帳中親信武皇定雲中授右牙都校後以功為大同軍防禦使檢校司空乾寧初為昭義軍節度使雲郎王都本姓劉小字雲郎中山陘邑人太原王王處直養為己子後奪據父位遷太尉侍中周玄豹見之曰王都形似鯉魚難免刀机明宗即位加中書令以其奪據父位深心惡之後以謀叛自焚生鐵張敬達字志通代州人小字生鐵少以騎射著名明宗即位拜檢校太保應州節度使清泰中自彭門移鎮平陽加檢校少傅末帝詔以敬達為北面行營都招討使以定州節度楊光遠副焉以軍敗為安審琦楊光遠斬敬達首以降晉俱舊五代史唐傳阿檀楊光遠字德明小字阿檀其先沙陀部人也事莊宗為騎將明宗朝歷媯瀛冀易四州剌史累加校檢少傅將兵戍蔚州晉高祖舉義兵於太原唐末帝遣光遠與張敬達屯兵於城下俄而契丹大至為其所敗光遠與次將安審琦殺敬達歸命高祖少帝嗣位冊拜太師封壽王謀叛逆拉殺之五代史晉傳鐵胡安重榮小字鐵胡朔州人有力善騎射為振武巡邊指揮使晉高祖起太原使張穎陰招重榮高祖即位拜成德軍節度使後以反逆斬首晉高祖漆其首送于契丹五代史本傳樵夫趙曮尚書右丞上交子小字樵夫官至著作郎三朝國史虎兒蘇轍字子由生子遠小字虎兒東坡集載虎兒詩云舊聞老蚌生明珠未省老兔生於菟老兔自謂月中物不騎快馬騎蟾蜍蟾蜍爬沙不肯行坐令青衫垂白鬚於菟駿猛不類渠指揮黃熊駕黑貙砂丹紫麝不用塗眼光百步走妖狐妖狐莫誇智有餘不勞搖牙咀爾徒東坡文集米友仁字元暉禮部外郎元章子小字虎兒位至兵部侍郎敷文閣待制幼年山谷贈詩云我有元暉古印章印刓不忍與諸郎虎兒筆力能扛鼎教字元暉繼阿章山谷文集梁羅蘇遲小名梁适小名羅並子由子東坡詩載端午游真如遲适遠從子由在酒局云一與子由別卻數七端午隨身綵絲繫心與昌獨苦今年疋馬來佳節日夜數兒童喜我至典衣具雞黍水餅既懷鄉飯筒仍愍楚謂言必一醉快作西川語寧知是官身糟麴困薰煮獨攜三子出古剎訪禪祖高談付梁羅梁羅遲适小名詩律到阿虎遠小名歸來一調咲慰此長齟齬東坡文集小字錄終, WYG: ''}
